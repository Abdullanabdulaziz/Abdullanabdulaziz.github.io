<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abdulla Nabil | Software Engineer</title>
    
    <!-- Meta Tags -->
    <meta name="description" content="Abdulla Nabil is a Software Engineer with expertise in web development, automation, and plugin architecture.">
    <meta name="keywords" content="Software Engineer, Web Developer, WordPress, React, Python, PHP, Automation">
    <meta name="author" content="Abdulla Nabil">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <script>
        // Immediately set theme to prevent flash of unstyled content
        (function() {
            const savedTheme = localStorage.getItem('theme') || 
                             (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', savedTheme);
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
            }
        })();
    </script>
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#f3f2f9" id="theme-color">
    <meta name="color-scheme" content="dark light">
    
    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://abdullanabdulaziz.github.io/">
    <meta property="og:title" content="Abdulla Nabil | Software Engineer">
    <meta property="og:description" content="Software Engineer with expertise in web development, automation, and plugin architecture.">
    <meta property="og:image" content="https://abdullanabdulaziz.github.io/og-image.jpg">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Abdulla Nabil | Software Engineer">
    <meta name="twitter:description" content="Software Engineer with expertise in web development, automation, and plugin architecture.">
    <meta name="twitter:image" content="https://abdullanabdulaziz.github.io/og-image.jpg">
</head>
<body>
    <!-- Splash Screen -->
    <div class="splashscreen" style="display: flex;">
        <div class="splash-content">
            <div class="shape-loader">
                <div class="shape shape-1"></div>
                <div class="shape shape-2"></div>
                <div class="shape shape-3"></div>
                <div class="shape shape-4"></div>
            </div>
            <h2 class="loading-text">Materializing Shapes</h2>
        </div>
    </div>

    <!-- Particles Background -->
    <div id="particles-js"></div>

    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="#" class="logo-link">
                        <span class="logo-text">abdulla.dev</span>
                    </a>
                </div>
                
                <div class="header-actions">
                    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                        <i class="fas fa-moon theme-icon"></i>
                        <i class="fas fa-sun theme-icon" style="display: none;"></i>
                    </button>
                    
                    <button class="dots-menu-toggle" aria-label="Toggle navigation menu">
                        <div class="dots-menu">
                            <span class="dot"></span>
                            <span class="dot"></span>
                            <span class="dot"></span>
                            <span class="dot"></span>
                        </div>
                    </button>
                </div>
                
                <!-- Navigation Menu -->
                <nav class="nav-menu">
                    <div class="nav-menu-content">
                        <a href="index.html" class="nav-link active">
                            <span>Home</span>
                            <i class="fas fa-home"></i>
                        </a>
                        <a href="pages/about.html" class="nav-link">
                            <span>About</span>
                            <i class="fas fa-user"></i>
                        </a>
                        <a href="pages/skills.html" class="nav-link">
                            <span>Skills</span>
                            <i class="fas fa-code"></i>
                        </a>
                        <a href="pages/projects.html" class="nav-link">
                            <span>Projects</span>
                            <i class="fas fa-project-diagram"></i>
                        </a>
                        <a href="pages/contact.html" class="nav-link">
                            <span>Contact</span>
                            <i class="fas fa-envelope"></i>
                        </a>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section id="home" class="hero-section">
        <div class="container">
            <div class="hero-content">
                <div class="intro-wrapper">
                    <div class="intro-text">
                        <h1 class="intro-heading">
                            <span class="intro-line">Hey, I'm </span>
                            <span class="name">Abdulla Nabil</span>
                        </h1>
                        <div class="intro-roles">
                            <p class="intro-role">I'm a <span class="highlight">Software Engineer</span> with a passion for</p>
                            <div class="typing-text">
                                <span class="typed-text">Web Development</span>
                                <span class="cursor">&nbsp;</span>
                            </div>
                        </div>
                        <div class="intro-links">
                            <a href="pages/projects.html" class="btn btn-primary">View My Work</a>
                            <a href="pages/contact.html" class="btn btn-outline">Get In Touch</a>
                        </div>
                    </div>
                </div>
                <div class="hero-visual">
                    <!-- Add your hero image or illustration here -->
                    <div class="hero-image"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- End of Hero Section -->
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/scrollreveal@4.0.7/dist/scrollreveal.min.js"></script>
    <script src="main.js?v=1.0.2"></script>
    <script>
        // Initialize ScrollReveal
        ScrollReveal().reveal('.animate-on-scroll', {
            delay: 200,
            distance: '20px',
            duration: 1000,
            easing: 'cubic-bezier(0.5, 0, 0, 1)',
            interval: 200,
            reset: true
        });

        // Set current year in footer if the element exists
        const currentYearElement = document.getElementById('current-year');
        if (currentYearElement) {
            currentYearElement.textContent = new Date().getFullYear();
        }

        // Initialize particles.js
        if (document.getElementById('particles-js')) {
            particlesJS('particles-js', {
                particles: {
                    number: { value: 80, density: { enable: true, value_area: 800 } },
                    color: { value: '#606887' },
                    shape: { type: 'circle' },
                    opacity: {
                        value: 0.5,
                        random: true,
                        anim: { enable: true, speed: 1, opacity_min: 0.1, sync: false }
                    },
                    size: {
                        value: 3,
                        random: true,
                        anim: { enable: true, speed: 2, size_min: 0.1, sync: false }
                    },
                    line_linked: {
                        enable: true,
                        distance: 150,
                        color: '#606887',
                        opacity: 0.4,
                        width: 1
                    },
                    move: {
                        enable: true,
                        speed: 1,
                        direction: 'none',
                        random: true,
                        straight: false,
                        out_mode: 'out',
                        bounce: false
                    }
                },
                interactivity: {
                    detect_on: 'canvas',
                    events: {
                        onhover: { enable: true, mode: 'grab' },
                        onclick: { enable: true, mode: 'push' },
                        resize: true
                    },
                    modes: {
                        grab: { distance: 140, line_linked: { opacity: 0.7 } },
                        push: { particles_nb: 4 }
                    }
                },
                retina_detect: true
            });
        }
    </script>
</body>
</html>
