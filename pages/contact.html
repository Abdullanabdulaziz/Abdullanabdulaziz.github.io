<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- Styles -->

    <meta name="theme-color" content="#f3f2f9" id="theme-color">
    <meta name="color-scheme" content="dark light">
    
    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>
    <!-- Splash Screen -->
    <div class="splashscreen" style="display: flex;">
        <div class="splash-content">
            <div class="shape-loader">
                <div class="shape shape-1"></div>
                <div class="shape shape-2"></div>
                <div class="shape shape-3"></div>
                <div class="shape shape-4"></div>
            </div>
            <h2 class="loading-text">Materializing Shapes</h2>
        </div>
    </div>

    <!-- Particles Background -->
    <div id="particles-js"></div>

    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="../index.html" class="logo-link">
                        <span class="logo-text">abdulla.dev</span>
                    </a>
                </div>
                
                <div class="header-actions">
                    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                        <i class="fas fa-moon theme-icon"></i>
                        <i class="fas fa-sun theme-icon" style="display: none;"></i>
                    </button>
                    
                    <button class="dots-menu-toggle" aria-label="Toggle navigation menu">
                        <div class="dots-menu">
                            <span class="dot"></span>
                            <span class="dot"></span>
                            <span class="dot"></span>
                            <span class="dot"></span>
                        </div>
                    </button>
                </div>
                
                <!-- Navigation Menu -->
                <nav class="nav-menu">
                    <div class="nav-menu-content">
                        <a href="../index.html" class="nav-link">
                            <span>Home</span>
                            <i class="fas fa-home"></i>
                        </a>
                        <a href="about.html" class="nav-link">
                            <span>About</span>
                            <i class="fas fa-user"></i>
                        </a>
                        <a href="skills.html" class="nav-link">
                            <span>Skills</span>
                            <i class="fas fa-code"></i>
                        </a>
                        <a href="projects.html" class="nav-link">
                            <span>Projects</span>
                            <i class="fas fa-project-diagram"></i>
                        </a>
                        <a href="contact.html" class="nav-link active">
                            <span>Contact</span>
                            <i class="fas fa-envelope"></i>
                        </a>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <!-- Contact Section -->
    <section id="contact" class="py-5">
        <div class="container">
            <div class="section-header text-center">
                <h2>Get In Touch</h2>
                <p class="section-subtitle">I'd love to hear from you</p>
            </div>
            
            <div class="contact-container">
                <div class="contact-info">
                    <div class="contact-method">
                        <div class="contact-icon">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <div class="contact-details">
                            <h4>Email Me</h4>
                            <a href="mailto:abdallahnabil830@gmail.com">abdallahnabil830@gmail.com</a>
                        </div>
                    </div>
                    
                    <div class="contact-method">
                        <div class="contact-icon">
                            <i class="fas fa-phone"></i>
                        </div>
                        <div class="contact-details">
                            <h4>Call Me</h4>
                            <a href="tel:+201064461082">+20 106 446 1082</a>
                        </div>
                    </div>
                    
                    <div class="contact-method">
                        <div class="contact-icon">
                            <i class="fas fa-map-marker-alt"></i>
                        </div>
                        <div class="contact-details">
                            <h4>Location</h4>
                            <p>Cairo, Egypt</p>
                        </div>
                    </div>
                    
                    <div class="social-links">
                        <a href="https://github.com/Abdullanabdulaziz" target="_blank" class="social-link" aria-label="GitHub">
                            <i class="fab fa-github"></i>
                        </a>
                        <a href="https://www.linkedin.com/in/abdulla-abdulaziz-65321b2bb/" target="_blank" class="social-link" aria-label="LinkedIn">
                            <i class="fab fa-linkedin-in"></i>
                        </a>
                    </div>
                </div>
                
                <form id="contact-form" class="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" class="form-control" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" class="form-control" required></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/scrollreveal@4.0.7/dist/scrollreveal.min.js"></script>
    <script src="../main.js"></script>
